version: '3.8'

services:
  b20-bot:
    build: .
    container_name: b20-bot
    restart: always
    environment:
      - RPC_URL=${RPC_URL}
      - PRIVATE_KEY=${PRIVATE_KEY}
      - FLASHBOTS_RPC=${FLASHBOTS_RPC}
      - TG_BOT_TOKEN=${TG_BOT_TOKEN}
      - TG_USER_ID=${TG_USER_ID}
      - MAX_TRADE_ETH=${MAX_TRADE_ETH}
      - MAX_DAILY_LOSS_ETH=${MAX_DAILY_LOSS_ETH}
      - MIN_LIQUIDITY_ETH=${MIN_LIQUIDITY_ETH}
      - SLIPPAGE_BPS=${SLIPPAGE_BPS}
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  prometheus:
    image: prom/prometheus:latest
    container_name: b20-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: b20-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
